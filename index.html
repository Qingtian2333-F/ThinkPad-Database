<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkPad Specs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<aside>
    <div class="logo">ThinkPad <span>Specs</span></div>
    
    <!-- 筛选切换区域 -->
    <div class="filter-toggle-panel">
        <div class="toggle-buttons">
            <button id="filterFamilyBtn" class="filter-btn active">按系列</button>
            <button id="filterGenBtn" class="filter-btn">按代数</button>
        </div>
        
        <div id="familyFilterContainer" class="filter-options">
            <select id="familySelect">
                <option value="">全部系列</option>
            </select>
        </div>
        
        <div id="genFilterContainer" class="filter-options" style="display: none;">
            <select id="generationSelect">
                <option value="">全部代数</option>
            </select>
        </div>
        
        <button class="reset-filter-btn" id="resetFilterBtn">重置筛选</button>
    </div>
    
    <div class="model-list-header">
        <span>型号列表</span>
        <span class="model-count-badge" id="modelCount">0</span>
    </div>
    
    <div id="modelMenu" class="nav-list"></div>
</aside>

<main id="content">
    <div id="specDisplay">
        <div style="text-align:center; padding-top:60px; color:#777;">
            <h2>请从左侧选择型号</h2>
        </div>
    </div>
</main>

<!-- FRU 模态框 -->
<div id="fruModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3>可能使用的 FRU</h3>
            <button class="modal-close" onclick="closeFruModal()">&times;</button>
        </div>
        <div id="fruModalBody" class="modal-body">加载中...</div>
    </div>
</div>

<script>
    // ---------- 全局变量 ----------
    let masterModelList = [];
    const partsCache = { cpu: {}, ethernet: {}, wlan: {}, wwan: {}, display: {}, graphics: {}, dock: {} };
    let currentFilterType = 'family';
    let currentFamilyValue = '';
    let currentGenValue = '';
    let menuCounter = 0;                     // 用于生成唯一菜单ID
    let currentDeviceParts = null;            // 当前设备所有部件数据

    // DOM 元素
    const menuEl = document.getElementById('modelMenu');
    const specDisplayEl = document.getElementById('specDisplay');
    const modelCountSpan = document.getElementById('modelCount');
    const filterFamilyBtn = document.getElementById('filterFamilyBtn');
    const filterGenBtn = document.getElementById('filterGenBtn');
    const familyContainer = document.getElementById('familyFilterContainer');
    const genContainer = document.getElementById('genFilterContainer');
    const familySelect = document.getElementById('familySelect');
    const generationSelect = document.getElementById('generationSelect');
    const resetBtn = document.getElementById('resetFilterBtn');

    // ---------- 菜单悬停控制 ----------
    window.menuTimers = {};
    window.menuEnter = function(menuId) {
        if (window.menuTimers[menuId]) {
            clearTimeout(window.menuTimers[menuId]);
            delete window.menuTimers[menuId];
        }
        const menu = document.getElementById(menuId);
        if (menu) menu.classList.remove('hidden');
    };
    window.menuLeave = function(menuId) {
        window.menuTimers[menuId] = setTimeout(() => {
            const menu = document.getElementById(menuId);
            if (menu) menu.classList.add('hidden');
            delete window.menuTimers[menuId];
        }, 100);
    };

    // ---------- 折叠/展开卡片 ----------
    window.toggleCard = function(header) {
        const card = header.closest('.part-card');
        if (!card) return;
        const body = card.querySelector('.part-card-body');
        const icon = header.querySelector('.fold-icon');
        card.classList.toggle('folded');
        if (card.classList.contains('folded')) {
            icon.textContent = '▶'; // 折叠状态
        } else {
            icon.textContent = '▼'; // 展开状态
        }
    };

    // ---------- FRU 模态框 ----------
    window.closeFruModal = function() {
        document.getElementById('fruModal').classList.remove('show');
    };
    function showFruModal(partData) {
        const modal = document.getElementById('fruModal');
        const body = document.getElementById('fruModalBody');
        body.innerHTML = formatFruContent(partData);
        modal.classList.add('show');
    }
    window.showFruModalByPartId = function(menuItem, partId, menuId) {
        if (event) event.stopPropagation();
        if (!currentDeviceParts) return;
        const [type, index] = partId.split('_');
        const part = currentDeviceParts[type]?.[parseInt(index)];
        if (part) showFruModal(part.data);
        // 关闭当前菜单
        const menu = document.getElementById(menuId);
        if (menu) menu.classList.add('hidden');
        if (window.menuTimers[menuId]) clearTimeout(window.menuTimers[menuId]);
    };

    // ---------- 格式化 FRU 内容 ----------
    function formatFruContent(partData) {
        if (!partData) return '<div class="no-fru">无 FRU 信息</div>';
        const frus = partData.FRUs || partData.frus || partData.Frus;
        if (!frus) return '<div class="no-fru">该部件无 FRU 数据</div>';
        let items = [];
        if (Array.isArray(frus)) {
            frus.forEach(item => {
                if (typeof item === 'string') items.push(item);
                else if (typeof item === 'object') {
                    Object.entries(item).forEach(([k, v]) => items.push(`${k}: ${v}`));
                }
            });
        } else if (typeof frus === 'object') {
            Object.entries(frus).forEach(([k, v]) => items.push(`${k}: ${v}`));
        } else {
            items.push(String(frus));
        }
        if (items.length === 0) return '<div class="no-fru">无 FRU 信息</div>';
        return items.map(text => `<div class="fru-item">${text}</div>`).join('');
    }

    // ---------- 格式化部件详细信息（返回 HTML）----------
    function formatPartFullInfo(partData, partType) {
        if (!partData) return '<div class="no-info">无信息</div>';
        const data = partData.thinkpad_database?.[0] || partData;
        const lines = [];

        if (partType === 'ethernet') {
            let mainLine = '';
            if (data.type) mainLine += data.type;
            if (data['model-type']) mainLine += `，${data['model-type']}`;
            if (mainLine) lines.push(`<div class="part-title">${mainLine}</div>`);
            for (const [key, value] of Object.entries(data)) {
                if (key === 'type' || key === 'model-type') continue;
                if (value == null || value === '') continue;
                if (typeof value === 'object') continue;
                const fieldName = key.replace(/_/g, ' ');
                lines.push(`<div><span class="field-name">${fieldName}:</span> <span class="field-value">${value}</span></div>`);
            }
        }
        else if (partType === 'cpu') {
            if (data.model) lines.push(`<div class="part-title">${data.model}</div>`);
            if (data.cores_threads) lines.push(`<div><span class="field-name">核心/线程:</span> <span class="field-value">${data.cores_threads}</span></div>`);
            if (data.base_freq) lines.push(`<div><span class="field-name">基础频率:</span> <span class="field-value">${data.base_freq}</span></div>`);
            if (data.turbo_freq && data.turbo_freq !== 'null') lines.push(`<div><span class="field-name">睿频:</span> <span class="field-value">${data.turbo_freq}</span></div>`);
            if (data.cache) lines.push(`<div><span class="field-name">缓存:</span> <span class="field-value">${data.cache}</span></div>`);
            if (data.graphics) lines.push(`<div><span class="field-name">集成显卡:</span> <span class="field-value">${data.graphics}</span></div>`);
            const excludeFields = ['model','cores_threads','base_freq','turbo_freq','cache','graphics','iconfamily','ark'];
            for (const [key, value] of Object.entries(data)) {
                if (excludeFields.includes(key)) continue;
                if (value && typeof value !== 'object') {
                    const fieldName = key.replace(/_/g, ' ');
                    lines.push(`<div><span class="field-name">${fieldName}:</span> <span class="field-value">${value}</span></div>`);
                }
            }
        }
        else if (partType === 'display') {
            if (data.type) lines.push(`<div class="part-title">${data.type}</div>`);
            if (data.tech) lines.push(`<div><span class="field-name">技术:</span> <span class="field-value">${data.tech}</span></div>`);
            if (data.brightness) lines.push(`<div><span class="field-name">亮度:</span> <span class="field-value">${data.brightness}</span></div>`);
            if (data.contrast) lines.push(`<div><span class="field-name">对比度:</span> <span class="field-value">${data.contrast}</span></div>`);
            if (data.viewing_angle) lines.push(`<div><span class="field-name">视角:</span> <span class="field-value">${data.viewing_angle}</span></div>`);
            if (data.touch) lines.push(`<div><span class="field-name">触摸:</span> <span class="field-value">${data.touch}</span></div>`);
            if (data.refresh_rate) lines.push(`<div><span class="field-name">刷新率:</span> <span class="field-value">${data.refresh_rate}</span></div>`);
            if (data.color_gamut) lines.push(`<div><span class="field-name">色域:</span> <span class="field-value">${data.color_gamut}</span></div>`);
            for (const [key, value] of Object.entries(data)) {
                if (['type','tech','brightness','contrast','viewing_angle','touch','refresh_rate','color_gamut'].includes(key)) continue;
                if (value && typeof value !== 'object') {
                    const fieldName = key.replace(/_/g, ' ');
                    lines.push(`<div><span class="field-name">${fieldName}:</span> <span class="field-value">${value}</span></div>`);
                }
            }
        }
        else if (partType === 'graphics') {
            if (data.model) lines.push(`<div class="part-title">${data.model}</div>`);
            const keyFields = [
                { key: 'Shading Units', label: '着色单元' },
                { key: 'base_freq', label: '基础频率' },
                { key: 'turbo_freq', label: '睿频' },
                { key: 'VRAM', label: '显存' },
                { key: 'Generation', label: '架构' },
                { key: 'Feature', label: '特性' }
            ];
            const excludeFields = ['model', 'iconfamily'];
            for (const field of keyFields) {
                if (data[field.key] != null && data[field.key] !== '') {
                    lines.push(`<div><span class="field-name">${field.label}:</span> <span class="field-value">${data[field.key]}</span></div>`);
                    excludeFields.push(field.key);
                }
            }
            for (const [key, value] of Object.entries(data)) {
                if (excludeFields.includes(key)) continue;
                if (value == null || value === '') continue;
                if (typeof value === 'object') continue;
                const fieldName = key.replace(/_/g, ' ');
                lines.push(`<div><span class="field-name">${fieldName}:</span> <span class="field-value">${value}</span></div>`);
            }
        }
        else if (partType === 'dock') {
            // 扩展坞信息
            if (data.model) lines.push(`<div class="part-title">${data.model}</div>`);
            // 端口列表
            if (data.ports && Array.isArray(data.ports)) {
                lines.push(`<div><span class="field-name">端口:</span></div>`);
                data.ports.forEach(port => {
                    lines.push(`<div style="margin-left: 12px;">• ${port}</div>`);
                });
            } else if (data.ports) {
                lines.push(`<div><span class="field-name">端口:</span> <span class="field-value">${data.ports}</span></div>`);
            }
            // 电源
            if (data.power) {
                lines.push(`<div><span class="field-name">供电:</span> <span class="field-value">${data.power}</span></div>`);
            }
            // 其他字段
            for (const [key, value] of Object.entries(data)) {
                if (['model', 'ports', 'power'].includes(key)) continue;
                if (value && typeof value !== 'object') {
                    const fieldName = key.replace(/_/g, ' ');
                    lines.push(`<div><span class="field-name">${fieldName}:</span> <span class="field-value">${value}</span></div>`);
                }
            }
        }
        else {
            // 无线网卡 / WWAN
            const keyFieldGroups = [
                { keys: ['type', 'model', 'chipset'], isTitle: true },
                { keys: ['form'], label: '形态' },
                { keys: ['feature'], label: '功能' }
            ];
            const usedKeys = new Set();
            for (const group of keyFieldGroups) {
                if (group.isTitle) {
                    for (const key of group.keys) {
                        if (data[key] != null && data[key] !== '') {
                            const valStr = typeof data[key] === 'object' ? JSON.stringify(data[key]) : String(data[key]);
                            lines.push(`<div class="part-title">${valStr}</div>`);
                            usedKeys.add(key);
                            break;
                        }
                    }
                }
            }
            for (const group of keyFieldGroups) {
                if (!group.isTitle) {
                    for (const key of group.keys) {
                        if (data[key] != null && data[key] !== '' && !usedKeys.has(key)) {
                            const valStr = typeof data[key] === 'object' ? JSON.stringify(data[key]) : String(data[key]);
                            lines.push(`<div><span class="field-name">${group.label}:</span> <span class="field-value">${valStr}</span></div>`);
                            usedKeys.add(key);
                            break;
                        }
                    }
                }
            }
            for (const [key, value] of Object.entries(data)) {
                if (usedKeys.has(key)) continue;
                if (value == null || value === '') continue;
                if (typeof value === 'object') continue;
                const fieldName = key.replace(/_/g, ' ');
                lines.push(`<div><span class="field-name">${fieldName}:</span> <span class="field-value">${value}</span></div>`);
            }
        }
        return lines.join('') || '<div class="no-info">无详细信息</div>';
    }

    // ---------- 加载零件数据 ----------
    async function loadPartData(type, filename) {
        if (!filename) return null;
        let fullFilename = filename.endsWith('.json') ? filename : filename + '.json';
        if (partsCache[type]?.[fullFilename]) return partsCache[type][fullFilename];

        const folderMap = {
            cpu: 'CPU',
            ethernet: 'Ethernet',
            wlan: 'WLAN',
            wwan: 'WWAN',
            display: 'Display',
            graphics: 'Graphics',
            dock: 'Dock'
        };
        const folder = folderMap[type] || type;
        const filePath = `modeldata/${folder}/${fullFilename}`;
        try {
            const resp = await fetch(filePath);
            if (!resp.ok) {
                if (fullFilename.endsWith('.json')) {
                    const altPath = `modeldata/${folder}/${filename}`;
                    const altResp = await fetch(altPath);
                    if (altResp.ok) {
                        const data = await altResp.json();
                        partsCache[type][fullFilename] = data;
                        return data;
                    }
                }
                return null;
            }
            const data = await resp.json();
            partsCache[type][fullFilename] = data;
            return data;
        } catch (err) {
            console.error(`加载 ${filePath} 失败:`, err);
            return null;
        }
    }

    async function loadDeviceParts(device) {
        console.log('[调试] 加载设备零件，型号:', device.model_name);
        const parts = { cpu: [], ethernet: [], wlan: [], wwan: [], display: [], graphics: [], dock: [] };

        // CPU
        if (device.processor_options?.length) {
            console.log('[调试] processor_options:', device.processor_options);
            for (const cpuItem of device.processor_options) {
                const cpuData = await loadPartData('cpu', cpuItem);
                parts.cpu.push({ data: cpuData || { model: cpuItem, note: '等待补充' }, name: cpuItem, type: 'cpu' });
            }
        } else {
            console.log('[调试] 无 processor_options');
        }

        // Display
        if (device.display_options?.length) {
            console.log('[调试] display_options:', device.display_options);
            for (const dispItem of device.display_options) {
                const dispData = await loadPartData('display', dispItem);
                parts.display.push({ data: dispData || { type: dispItem, note: '等待补充' }, name: dispItem, type: 'display' });
            }
        } else {
            console.log('[调试] 无 display_options');
        }

        // Graphics
        if (device.graphics_options?.length) {
            console.log('[调试] graphics_options:', device.graphics_options);
            for (const gpuItem of device.graphics_options) {
                const gpuData = await loadPartData('graphics', gpuItem);
                parts.graphics.push({ data: gpuData || { model: gpuItem, note: '等待补充' }, name: gpuItem, type: 'graphics' });
            }
        } else {
            console.log('[调试] 无 graphics_options');
        }

        // Ethernet
        if (device.Ethernet) {
            const ethItems = parseCommaSeparatedString(device.Ethernet);
            console.log('[调试] Ethernet:', ethItems);
            for (const ethItem of ethItems) {
                const ethData = await loadPartData('ethernet', ethItem);
                parts.ethernet.push({ data: ethData || { type: ethItem }, name: ethItem, type: 'ethernet' });
            }
        } else {
            console.log('[调试] 无 Ethernet');
        }

        // WLAN
        if (device.WLAN) {
            const wlanItems = Array.isArray(device.WLAN) ? device.WLAN : [device.WLAN];
            console.log('[调试] WLAN:', wlanItems);
            for (const wlanItem of wlanItems) {
                const wlanData = await loadPartData('wlan', wlanItem);
                parts.wlan.push({ data: wlanData || { type: wlanItem }, name: wlanItem, type: 'wlan' });
            }
        } else {
            console.log('[调试] 无 WLAN');
        }

        // WWAN
        if (device.WWAN) {
            const wwanItems = Array.isArray(device.WWAN) ? device.WWAN : [device.WWAN];
            console.log('[调试] WWAN:', wwanItems);
            for (const wwanItem of wwanItems) {
                const wwanData = await loadPartData('wwan', wwanItem);
                parts.wwan.push({ data: wwanData || { type: wwanItem }, name: wwanItem, type: 'wwan' });
            }
        } else {
            console.log('[调试] 无 WWAN');
        }

        // 扩展坞 (Dock)
        if (device.dock_support) {
            const dockItems = Array.isArray(device.dock_support) ? device.dock_support : [device.dock_support];
            console.log('[调试] dock_support:', dockItems);
            for (const dockItem of dockItems) {
                const dockData = await loadPartData('dock', dockItem);
                parts.dock.push({ data: dockData || { model: dockItem, note: '等待补充' }, name: dockItem, type: 'dock' });
            }
        } else {
            console.log('[调试] 无 dock_support');
        }

        console.log('[调试] 最终 parts:', parts);
        return parts;
    }

    function parseCommaSeparatedString(str) {
        if (!str) return [];
        if (Array.isArray(str)) return str;
        return str.split(',').map(s => s.trim()).filter(Boolean);
    }

    // ---------- 加载设备数据（使用 index.json）----------
    async function loadModelFiles() {
        specDisplayEl.innerHTML = '<div class="loading">加载数据中...</div>';
        try {
            let fileList = [];
            try {
                const indexResp = await fetch('modeldata/index.json');
                if (indexResp.ok) {
                    const indexData = await indexResp.json();
                    fileList = indexData.files || indexData;
                } else throw new Error('index.json 不存在');
            } catch (e) {
                console.warn('未找到 modeldata/index.json，使用默认文件列表');
                fileList = ['T460.json'];
            }
            const allModels = [];
            for (const fileName of fileList) {
                try {
                    const resp = await fetch(`modeldata/${fileName}`);
                    if (!resp.ok) continue;
                    const jsonData = await resp.json();
                    let items = [];
                    if (jsonData.thinkpad_database && Array.isArray(jsonData.thinkpad_database)) items = jsonData.thinkpad_database;
                    else if (Array.isArray(jsonData)) items = jsonData;
                    else items = [jsonData];
                    items.forEach(laptop => {
                        if (laptop.model_name) {
                            allModels.push({ filename: fileName, model_family: laptop.model_family || '未指定系列', model_generation: laptop.model_generation || '未指定代数', ...laptop });
                        }
                    });
                } catch (err) { console.error(`加载 ${fileName} 出错:`, err); }
            }
            if (allModels.length === 0) { specDisplayEl.innerHTML = '<div class="empty-message">没有找到设备数据</div>'; return; }
            masterModelList = allModels;
            populateFilterOptions();
            applyFilterAndRender();
        } catch (err) { console.error('致命错误:', err); specDisplayEl.innerHTML = '<div class="empty-message">加载数据失败</div>'; }
    }

    function populateFilterOptions() {
        const families = [...new Set(masterModelList.map(m => m.model_family).filter(Boolean))].sort();
        familySelect.innerHTML = '<option value="">全部系列</option>';
        families.forEach(f => { let opt = document.createElement('option'); opt.value = f; opt.textContent = f; familySelect.appendChild(opt); });
        const gens = [...new Set(masterModelList.map(m => m.model_generation).filter(Boolean))].sort((a,b) => (parseInt(b)||0) - (parseInt(a)||0));
        generationSelect.innerHTML = '<option value="">全部代数</option>';
        gens.forEach(g => { let opt = document.createElement('option'); opt.value = g; opt.textContent = g; generationSelect.appendChild(opt); });
        familySelect.value = ''; generationSelect.value = ''; currentFamilyValue = ''; currentGenValue = '';
    }

    function setFilterType(type) {
        currentFilterType = type;
        filterFamilyBtn.classList.toggle('active', type === 'family');
        filterGenBtn.classList.toggle('active', type === 'generation');
        familyContainer.style.display = type === 'family' ? 'block' : 'none';
        genContainer.style.display = type === 'generation' ? 'block' : 'none';
        applyFilterAndRender();
    }

    function getFilteredModels() {
        if (currentFilterType === 'family') return currentFamilyValue ? masterModelList.filter(m => m.model_family === currentFamilyValue) : masterModelList;
        else return currentGenValue ? masterModelList.filter(m => m.model_generation === currentGenValue) : masterModelList;
    }

    function renderMenu(models) {
        menuEl.innerHTML = '';
        models.forEach(model => {
            const item = document.createElement('div');
            item.className = 'nav-item';
            item.dataset.modelId = model.model_name;
            item.innerHTML = model.model_name;
            item.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                renderSpecs(model);
            };
            menuEl.appendChild(item);
        });
        modelCountSpan.textContent = models.length;
    }

    function applyFilterAndRender() {
        const filtered = getFilteredModels();
        renderMenu(filtered);
        if (filtered.length === 0) { specDisplayEl.innerHTML = '<div class="empty-message">没有符合筛选条件的型号</div>'; return; }
        const activeItem = document.querySelector('.nav-item.active');
        let targetModel = activeItem ? filtered.find(m => m.model_name === activeItem.dataset.modelId) : filtered[0];
        if (!targetModel) targetModel = filtered[0];
        renderSpecs(targetModel);
        document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.modelId === targetModel.model_name));
    }

    // ---------- 部件卡片渲染（带悬停菜单，支持 CPU 和显卡图标，可折叠）----------
    function renderPartCard(parts, title, type) {
        if (!parts || parts.length === 0) {
            return `
                <div class="part-card foldable-card">
                    <div class="part-card-header" onclick="toggleCard(this)">
                        <span class="card-title-text">${title}</span>
                        <span class="fold-icon">▼</span>
                    </div>
                    <div class="part-card-body">
                        <div class="part-item">无</div>
                    </div>
                </div>
            `;
        }
        let itemsHtml = '';
        parts.forEach((part, idx) => {
            const infoHtml = formatPartFullInfo(part.data, part.type);
            const menuId = `card-menu-${menuCounter++}`;
            const partId = `${type}_${idx}`;
            const hasFru = part.data && (part.data.FRUs || part.data.frus || part.data.Frus);
            let fruMenuItem = '';
            if (hasFru) {
                fruMenuItem = `<div class="card-menu-item" onclick="showFruModalByPartId(this, '${partId}', '${menuId}')">可能使用的 FRU</div>`;
            }
            let arkMenuItem = '';
            if (part.type === 'cpu') {
                const cpuData = part.data.thinkpad_database?.[0] || part.data;
                if (cpuData.ark) {
                    arkMenuItem = `<div class="card-menu-item" onclick="window.open('${encodeURI(cpuData.ark)}', '_blank', 'width=1200,height=800,scrollbars=yes,resizable=yes'); document.getElementById('${menuId}').classList.add('hidden'); event.stopPropagation();">查看 ARK</div>`;
                }
            }
            // 图标支持：CPU 和显卡
            let iconHtml = '';
            if (part.type === 'cpu' || part.type === 'graphics') {
                const partData = part.data.thinkpad_database?.[0] || part.data;
                if (partData.iconfamily) {
                    let iconFolder = '';
                    if (part.type === 'cpu') iconFolder = 'CPU/cpu_icon';
                    else if (part.type === 'graphics') iconFolder = 'Graphics/Graphics_icons';
                    const iconBase = `modeldata/${iconFolder}/${encodeURIComponent(partData.iconfamily)}`;
                    // 调试输出
                    console.log(`[图标调试] 尝试加载: ${iconBase}.jpg / .png (类型: ${part.type})`);
                    iconHtml = `<img src="${iconBase}.jpg" class="cpu-icon-bg" alt="" 
                        onerror="console.error('[图标调试] 加载失败: ' + this.src); this.onerror=null; this.src='${iconBase}.png'; this.onerror=function(){ console.error('[图标调试] 再次失败: ' + this.src); this.style.display='none'; };">`;
                } else {
                    console.warn(`[图标调试] ${part.type} 项缺少 iconfamily 字段:`, part.data);
                }
            }
            const menuItems = (fruMenuItem + arkMenuItem).trim();
            const menuHtml = menuItems ? `
                <div class="card-menu-container">
                    <button class="card-menu-btn" onmouseenter="menuEnter('${menuId}')" onmouseleave="menuLeave('${menuId}')">⋮</button>
                    <div id="${menuId}" class="card-menu-dropdown hidden" onmouseenter="menuEnter('${menuId}')" onmouseleave="menuLeave('${menuId}')">
                        ${fruMenuItem} ${arkMenuItem}
                    </div>
                </div>
            ` : '';
            itemsHtml += `
                <div class="part-item ${part.type}-item" data-part-id="${partId}">
                    <div class="part-info">${infoHtml}</div>
                    ${iconHtml}
                    ${menuHtml}
                </div>
            `;
        });
        return `
            <div class="part-card foldable-card">
                <div class="part-card-header" onclick="toggleCard(this)">
                    <span class="card-title-text">${title}</span>
                    <span class="fold-icon">▼</span>
                </div>
                <div class="part-card-body">
                    ${itemsHtml}
                </div>
            </div>
        `;
    }

    // ---------- 渲染详情 ----------
    async function renderSpecs(data) {
        if (!data) return;

        specDisplayEl.innerHTML = '<div class="loading">加载规格数据中...</div>';

        try {
            const parts = await loadDeviceParts(data);
            currentDeviceParts = parts;

            const physicalMaterial = data.physical?.case_material || data.case_material || '未知';

            // ---------- 内部型号徽章 ----------
            let modelCodeHtml = '';
            if (data.model_code) {
                const codeStr = Array.isArray(data.model_code)
                    ? data.model_code.join(' / ')
                    : data.model_code;
                modelCodeHtml = `<span class="model-code-badge">${codeStr}</span>`;
            }

            // ---------- 辅助函数：获取第一个有效 URL ----------
            function getFirstUrl(urlField) {
                if (!urlField) return null;
                if (Array.isArray(urlField)) {
                    return urlField.length > 0 ? urlField[0] : null;
                }
                return urlField;
            }
            const psrefUrl = getFirstUrl(data.PSREF_link);
            const userGuideUrl = getFirstUrl(data.user_guide_link);
            const hmmUrl = getFirstUrl(data.HMM_link);

            // ---------- 辅助函数：格式化附加信息 ----------
            function formatAddOnTips(tips) {
                if (!tips) return null;
                if (Array.isArray(tips)) {
                    if (tips.length === 0) return null;
                    return tips.map(item => {
                        if (typeof item === 'object') {
                            return Object.entries(item).map(([k, v]) => `${k}: ${v}`).join('<br>');
                        }
                        return item;
                    }).join('<br>');
                } else if (typeof tips === 'object') {
                    return Object.entries(tips).map(([k, v]) => `${k}: ${v}`).join('<br>');
                } else {
                    return String(tips);
                }
            }

            // ---------- 内存卡片（可折叠）----------
            const memoryCard = `
                <div class="part-card foldable-card">
                    <div class="part-card-header" onclick="toggleCard(this)">
                        <span class="card-title-text">内存</span>
                        <span class="fold-icon">▼</span>
                    </div>
                    <div class="part-card-body">
                        <div class="part-item">
                            <div class="part-info">
                                ${data.memory?.max_capacity ? `容量: ${data.memory.max_capacity}<br>` : ''}
                                ${data.memory?.type ? `类型: ${data.memory.type}<br>` : ''}
                                ${data.memory?.slots ? `插槽: ${data.memory.slots}<br>` : ''}
                                ${data.memory?.features ? `特性: ${data.memory.features}` : ''}
                                ${!data.memory ? '无内存信息' : ''}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // ---------- 存储卡片（可折叠）----------
            const storageCard = (() => {
                if (!data.storage) {
                    return `
                        <div class="part-card foldable-card">
                            <div class="part-card-header" onclick="toggleCard(this)">
                                <span class="card-title-text">存储</span>
                                <span class="fold-icon">▼</span>
                            </div>
                            <div class="part-card-body">
                                <div class="part-item">无存储信息</div>
                            </div>
                        </div>
                    `;
                }
                const fieldLabels = {
                    ssd_sata: 'SATA SSD',
                    ssd_pcie: 'PCIe SSD',
                    hdd: '2.5" HDD',
                    sshd: 'SSHD',
                    optical: '光驱'
                };
                const items = [];
                for (const [key, value] of Object.entries(data.storage)) {
                    if (value && typeof value === 'string' && value.trim() !== '') {
                        const title = fieldLabels[key] || key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                        const content = value.replace(/"/g, '&quot;');
                        items.push(`
                            <div class="part-item">
                                <div class="part-info">
                                    <div class="part-title">${title}</div>
                                    <div>${content}</div>
                                </div>
                            </div>
                        `);
                    }
                }
                if (items.length === 0) {
                    return `
                        <div class="part-card foldable-card">
                            <div class="part-card-header" onclick="toggleCard(this)">
                                <span class="card-title-text">存储</span>
                                <span class="fold-icon">▼</span>
                            </div>
                            <div class="part-card-body">
                                <div class="part-item">无详细存储信息</div>
                            </div>
                        </div>
                    `;
                }
                return `
                    <div class="part-card foldable-card storage-card">
                        <div class="part-card-header" onclick="toggleCard(this)">
                            <span class="card-title-text">存储</span>
                            <span class="fold-icon">▼</span>
                        </div>
                        <div class="part-card-body">
                            ${items.join('')}
                        </div>
                    </div>
                `;
            })();

            // ---------- 电池卡片（可折叠）----------
            const batteryCard = `
                <div class="part-card foldable-card">
                    <div class="part-card-header" onclick="toggleCard(this)">
                        <span class="card-title-text">电池与续航</span>
                        <span class="fold-icon">▼</span>
                    </div>
                    <div class="part-card-body">
                        ${(() => {
                            const batteries = data.Battary || data.battery || [];
                            if (batteries.length === 0) {
                                return '<div class="part-item"><div class="part-info">无电池信息</div></div>';
                            }
                            return batteries.map(b => {
                                const type = b.type || '电池';
                                const capacity = b.capacity || b.cap || '';
                                const tech = b.tech || b.technology || '';
                                const form = b.form || '';
                                let info = `${type}: ${capacity}`;
                                if (tech) info += ` (${tech})`;
                                if (form) info += ` - ${form}`;
                                return `<div class="part-item"><div class="part-info">${info}</div></div>`;
                            }).join('');
                        })()}
                    </div>
                </div>
            `;

            // ---------- 触摸与笔卡片（可折叠）----------
            let touchPenHtml = '';
            if (data.touch || data.pen) {
                const items = [];
                if (data.touch) {
                    const touchText = Array.isArray(data.touch) ? data.touch.join('、') : data.touch;
                    items.push(`<div class="part-item"><div class="part-info">触摸: ${touchText}</div></div>`);
                }
                if (data.pen) {
                    const penText = Array.isArray(data.pen) ? data.pen.join('、') : data.pen;
                    items.push(`<div class="part-item"><div class="part-info">笔: ${penText}</div></div>`);
                }
                touchPenHtml = `
                    <div class="part-card foldable-card">
                        <div class="part-card-header" onclick="toggleCard(this)">
                            <span class="card-title-text">触摸与笔</span>
                            <span class="fold-icon">▼</span>
                        </div>
                        <div class="part-card-body">
                            ${items.join('')}
                        </div>
                    </div>
                `;
            }

            // ---------- 显卡卡片（可折叠）----------
            let graphicsCardHtml = '';
            if (parts.graphics?.length > 0) {
                const graphicsItems = [];
                parts.graphics.forEach((gpu, idx) => {
                    const infoHtml = formatPartFullInfo(gpu.data, gpu.type);
                    const menuId = `card-menu-${menuCounter++}`;
                    const partId = `graphics_${idx}`;
                    const hasFru = gpu.data && (gpu.data.FRUs || gpu.data.frus || gpu.data.Frus);
                    let fruMenuItem = '';
                    if (hasFru) {
                        fruMenuItem = `<div class="card-menu-item" onclick="showFruModalByPartId(this, '${partId}', '${menuId}')">可能使用的 FRU</div>`;
                    }
                    const menuItems = fruMenuItem.trim();
                    const menuHtml = menuItems ? `
                        <div class="card-menu-container">
                            <button class="card-menu-btn" onmouseenter="menuEnter('${menuId}')" onmouseleave="menuLeave('${menuId}')">⋮</button>
                            <div id="${menuId}" class="card-menu-dropdown hidden" onmouseenter="menuEnter('${menuId}')" onmouseleave="menuLeave('${menuId}')">
                                ${fruMenuItem}
                            </div>
                        </div>
                    ` : '';

                    // 显卡图标
                    let iconHtml = '';
                    const gpuData = gpu.data.thinkpad_database?.[0] || gpu.data;
                    if (gpuData.iconfamily) {
                        const iconBase = `modeldata/Graphics/Graphics_icons/${encodeURIComponent(gpuData.iconfamily)}`;
                        iconHtml = `<img src="${iconBase}.jpg" class="cpu-icon-bg" alt="" 
                            onerror="this.onerror=null; this.src='${iconBase}.png'; this.onerror=function(){ this.style.display='none'; };">`;
                    }

                    graphicsItems.push(`
                        <div class="part-item graphics-item" data-part-id="${partId}">
                            <div class="part-info">${infoHtml}</div>
                            ${iconHtml}
                            ${menuHtml}
                        </div>
                    `);
                });

                graphicsCardHtml = `
                    <div class="part-card foldable-card">
                        <div class="part-card-header" onclick="toggleCard(this)">
                            <span class="card-title-text">显卡</span>
                            <span class="fold-icon">▼</span>
                        </div>
                        <div class="part-card-body">
                            ${graphicsItems.join('')}
                        </div>
                    </div>
                `;
            }

            // ---------- 显示输出卡片（可折叠）----------
            let outputInterfaceCardHtml = '';
            if (data.Display && (data.Display.max_resolution || data.Display.multi_display)) {
                const interfaceLines = [];
                if (data.Display.max_resolution && typeof data.Display.max_resolution === 'object') {
                    for (const [port, res] of Object.entries(data.Display.max_resolution)) {
                        if (res && typeof res === 'string') {
                            const portName = port.replace(/_/g, ' ');
                            interfaceLines.push(`<div><span class="field-name">${portName}:</span> <span class="field-value">${res}</span></div>`);
                        }
                    }
                }
                if (data.Display.multi_display) {
                    interfaceLines.push(`<div><span class="field-name">多屏支持:</span> <span class="field-value">${data.Display.multi_display}</span></div>`);
                }
                if (interfaceLines.length > 0) {
                    outputInterfaceCardHtml = `
                        <div class="part-card foldable-card">
                            <div class="part-card-header" onclick="toggleCard(this)">
                                <span class="card-title-text">显示输出</span>
                                <span class="fold-icon">▼</span>
                            </div>
                            <div class="part-card-body">
                                <div class="part-item">
                                    <div class="part-info">
                                        ${interfaceLines.join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }

            // 物理接口与多媒体表格行
            const portsRows = `
                <tr><th>接口</th><td>${Array.isArray(data.ports) ? data.ports.join('、') : data.ports || '无'}</td></tr>
                <tr><th>摄像头</th><td>${Array.isArray(data.camera) ? data.camera.join('、') : data.camera || '无'}</td></tr>
                <tr><th>音频</th><td>${Array.isArray(data.audio) ? data.audio.join('<br>') : data.audio || 'N/A'}</td></tr>
                <tr><th>键盘</th><td>${Array.isArray(data.keyboard) ? data.keyboard.join('<br>') : data.keyboard || 'N/A'}</td></tr>
                ${data['color calibration'] ? `
                <tr><th>校色仪</th><td>${Array.isArray(data['color calibration']) ? data['color calibration'].join('、') : data['color calibration']}</td></tr>
                ` : ''}
            `;

            // 附加信息行（仅在存在时显示）
            const addOnTipsHtml = formatAddOnTips(data.add_on_tips);
            const addOnTipsRow = addOnTipsHtml ? `<tr><th>附加信息</th><td>${addOnTipsHtml}</td></tr>` : '';

            // 其他卡片表格行
            const otherRows = `
                <tr><th>尺寸</th><td>${data.physical?.dimensions || 'N/A'}</td></tr>
                <tr><th>重量</th><td>${data.physical?.weight || 'N/A'}</td></tr>
                <tr><th>材质</th><td>${physicalMaterial}</td></tr>
                <tr><th>安全特性</th><td>${Array.isArray(data.security) ? data.security.join('<br>') : data.security || 'N/A'}</td></tr>
                <tr><th>预装系统</th><td>${Array.isArray(data.system) ? data.system.join('<br>') : data.system || 'N/A'}</td></tr>
                ${data.ACadapter ? `
                <tr><th>电源适配器</th><td>${Array.isArray(data.ACadapter) ? data.ACadapter.join('、') : data.ACadapter}</td></tr>
                ` : ''}
                ${addOnTipsRow}
            `;

            // 附加信息（标题下方的小字）
            const addonsHtml = data.addons ? `<p class="addons-note">${data.addons}</p>` : '';

            // 底部按钮
const buttonsHtml = `
    <div class="footer-buttons">
        ${psrefUrl ? `<a href="${psrefUrl}" class="footer-btn" onclick="window.open('${psrefUrl}', '_blank', 'width=1200,height=800,scrollbars=yes,resizable=yes'); return false;">PSREF网站</a>` : ''}
        ${userGuideUrl ? `<a href="${userGuideUrl}" class="footer-btn" onclick="window.open('${userGuideUrl}', '_blank', 'width=1200,height=800,scrollbars=yes,resizable=yes'); return false;">用户手册</a>` : ''}
        ${hmmUrl ? `<a href="${hmmUrl}" class="footer-btn" onclick="window.open('${hmmUrl}', '_blank', 'width=1200,height=800,scrollbars=yes,resizable=yes'); return false;">硬件维护指南</a>` : ''}
    </div>
`;

            // ---------- 最终渲染 ----------
            specDisplayEl.innerHTML = `
                <div class="header">
                    <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 4px;">
                        <h1 style="margin:0;">${data.model_name || '未知型号'}</h1>
                        ${modelCodeHtml}
                    </div>
                    <p>更新日期: ${data.update_date || 'N/A'}</p>
                    ${addonsHtml}
                </div>

                ${renderPartCard(parts.cpu, '处理器 (CPU)', 'cpu')}
                ${graphicsCardHtml}
                ${outputInterfaceCardHtml}
                ${memoryCard}
                ${renderPartCard(parts.display, '显示屏', 'display')}
                ${touchPenHtml}
                ${storageCard}
                ${batteryCard}
                ${renderPartCard(parts.ethernet, '有线网卡', 'ethernet')}
                ${renderPartCard(parts.wlan, '无线网卡', 'wlan')}
                ${renderPartCard(parts.wwan, 'WWAN', 'wwan')}
                ${renderPartCard(parts.dock, '扩展坞支持', 'dock')}

<div class="part-card foldable-card">
    <div class="part-card-header" onclick="toggleCard(this)">
        <span class="card-title-text">物理接口与多媒体</span>
        <span class="fold-icon">▼</span>
    </div>
    <div class="part-card-body">
        <table>
            ${portsRows}
        </table>
    </div>
</div>

<div class="part-card foldable-card">
    <div class="part-card-header" onclick="toggleCard(this)">
        <span class="card-title-text">其他</span>
        <span class="fold-icon">▼</span>
    </div>
    <div class="part-card-body">
        <table>
            ${otherRows}
        </table>
    </div>
</div>

                ${buttonsHtml}
            `;
        } catch (error) {
            console.error('渲染规格时出错:', error);
            specDisplayEl.innerHTML = '<div class="empty-message">加载规格数据失败</div>';
        }
    }

    // ---------- 事件绑定 ----------
    filterFamilyBtn.addEventListener('click', () => setFilterType('family'));
    filterGenBtn.addEventListener('click', () => setFilterType('generation'));
    familySelect.addEventListener('change', (e) => { currentFamilyValue = e.target.value; applyFilterAndRender(); });
    generationSelect.addEventListener('change', (e) => { currentGenValue = e.target.value; applyFilterAndRender(); });
    resetBtn.addEventListener('click', () => { familySelect.value = ''; generationSelect.value = ''; currentFamilyValue = ''; currentGenValue = ''; applyFilterAndRender(); });

    // 启动
    loadModelFiles();
</script>
</body>
</html>
