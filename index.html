<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkPad Specs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 侧边栏遮罩层（移动端使用） -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <aside>
        <div class="logo">
            ThinkPad Specs</span>
        </div>

        <!-- 筛选切换区域 -->
        <div class="filter-toggle-panel">
            <div class="toggle-buttons">
                <button id="filterFamilyBtn" class="filter-btn active">按系列</button>
                <button id="filterGenBtn" class="filter-btn">按代数</button>
            </div>

            <div id="familyFilterContainer" class="filter-options">
                <select id="familySelect">
                    <option value="">全部系列</option>
                </select>
            </div>

            <div id="genFilterContainer" class="filter-options" style="display: none;">
                <select id="generationSelect">
                    <option value="">全部代数</option>
                </select>
            </div>

            <button class="reset-filter-btn" id="resetFilterBtn">重置筛选</button>
        </div>

        <div class="model-list-header">
            <span>型号列表</span>
            <span class="model-count-badge" id="modelCount">0</span>
        </div>

        <div id="modelMenu" class="nav-list"></div>
    </aside>

    <main id="content">
        <div id="specDisplay">
            <div style="text-align:center; padding-top:60px; color:#777;">
                <h2>请从左侧选择型号</h2>
            </div>
        </div>
    </main>

    <!-- FRU 模态框 -->
    <div id="fruModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>可能使用的 FRU</h3>
                <button class="modal-close" onclick="closeFruModal()">&times;</button>
            </div>
            <div id="fruModalBody" class="modal-body">加载中...</div>
        </div>
    </div>

    <!-- 对比结果模态框 -->
    <div id="compareModal" class="modal-overlay">
        <div class="modal-content compare-modal-content">
            <div class="modal-header">
                <h3>型号对比</h3>
                <button class="modal-close" onclick="closeCompareModal()">&times;</button>
            </div>
            <div class="modal-body" id="compareModalBody">
                <!-- 动态表格 -->
            </div>
        </div>
    </div>

    <!-- 搜索模态框 -->
    <div id="searchModal" class="modal-overlay">
        <div class="modal-content search-modal-content">
            <div class="modal-header">
                <h3>搜索型号</h3>
                <button class="modal-close" onclick="closeSearchModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="searchModalInput" class="search-modal-input" placeholder="输入型号名称..." autocomplete="off">
                <div id="searchModalResults" class="search-modal-results">
                    <!-- 动态卡片列表 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 对比选择模态框 -->
    <div id="compareSelectModal" class="modal-overlay">
        <div class="modal-content compare-select-modal-content">
            <div class="modal-header">
                <h3>选择对比型号</h3>
                <button class="modal-close" onclick="closeCompareSelectModal()">&times;</button>
            </div>
            <div class="modal-body">
                <!-- 筛选切换 -->
                <div class="select-filter-panel">
                    <div class="toggle-buttons small">
                        <button id="selectFilterFamilyBtn" class="filter-btn small active">按系列</button>
                        <button id="selectFilterGenBtn" class="filter-btn small">按代数</button>
                    </div>
                    <div id="selectFamilyContainer" class="filter-options">
                        <select id="selectFamilySelect">
                            <option value="">全部系列</option>
                        </select>
                    </div>
                    <div id="selectGenContainer" class="filter-options" style="display: none;">
                        <select id="selectGenerationSelect">
                            <option value="">全部代数</option>
                        </select>
                    </div>
                    <!-- 搜索框 -->
                    <input type="text" id="compareSearchInput" class="search-modal-input" placeholder="搜索型号..." autocomplete="off">
                </div>
                <!-- 型号列表（带复选框） -->
                <div id="compareSelectList" class="compare-select-list">
                    <!-- 动态卡片 -->
                </div>
                <!-- 底部按钮 -->
                <div class="select-footer">
                    <button id="confirmCompareBtn" class="confirm-btn">确认对比</button>
                    <button id="clearSelectedBtn" class="clear-btn">清空选择</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 收藏模态框 -->
    <div id="favoritesModal" class="modal-overlay">
        <div class="modal-content favorites-modal-content">
            <div class="modal-header">
                <h3>我的收藏</h3>
                <button class="modal-close" onclick="closeFavoritesModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="favoritesModalList" class="favorites-modal-list">
                    <!-- 动态收藏列表 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 浮动按钮组（右下角） -->
    <div class="float-buttons">
        <button id="expandSidebarBtn" class="float-btn sidebar-expand-btn" title="显示侧边栏">☰</button>
        <button id="compareFloatBtn" class="float-btn" title="选择对比型号">📊</button>
        <button id="favoritesFloatBtn" class="float-btn" title="我的收藏">★</button>
        <button id="searchFloatBtn" class="float-btn" title="搜索型号">🔍</button>
        <button id="themeToggleFloat" class="float-btn" title="切换深色/浅色模式">🌙</button>
        <a id="generatorFloatBtn" class="float-btn" title="JSON生成器（但是我没写完）" href="generator.html" target="_blank">🛠️</a>
    </div>

    <script>
        // ---------- 全局变量 ----------
        let masterModelList = [];
        const partsCache = { cpu: {}, ethernet: {}, wlan: {}, wwan: {}, display: {}, graphics: {}, dock: {} };
        let currentFilterType = 'family';
        let currentFamilyValue = '';
        let currentGenValue = '';
        let selectedModels = [];                   // 对比选中的型号对象
        let menuCounter = 0;                        // 用于生成唯一菜单ID
        let currentDeviceParts = null;               // 当前设备所有部件数据

        // 收藏相关
        let favorites = JSON.parse(localStorage.getItem('thinkpad_favorites')) || [];

        // 秘密提示相关
        let secretTipsEnabled = false;
        let lastEnterTime = 0;

        // 对比选择模态框中的筛选状态
        let selectFilterType = 'family';
        let selectFamilyValue = '';
        let selectGenValue = '';
        let selectSearchTerm = '';

        // DOM 元素
        const menuEl = document.getElementById('modelMenu');
        const specDisplayEl = document.getElementById('specDisplay');
        const modelCountSpan = document.getElementById('modelCount');
        const filterFamilyBtn = document.getElementById('filterFamilyBtn');
        const filterGenBtn = document.getElementById('filterGenBtn');
        const familyContainer = document.getElementById('familyFilterContainer');
        const genContainer = document.getElementById('genFilterContainer');
        const familySelect = document.getElementById('familySelect');
        const generationSelect = document.getElementById('generationSelect');
        const resetBtn = document.getElementById('resetFilterBtn');

        // 搜索相关
        const searchFloatBtn = document.getElementById('searchFloatBtn');
        const searchModal = document.getElementById('searchModal');
        const searchModalInput = document.getElementById('searchModalInput');
        const searchModalResults = document.getElementById('searchModalResults');

        // 对比选择相关
        const compareFloatBtn = document.getElementById('compareFloatBtn');
        const compareSelectModal = document.getElementById('compareSelectModal');
        const selectFilterFamilyBtn = document.getElementById('selectFilterFamilyBtn');
        const selectFilterGenBtn = document.getElementById('selectFilterGenBtn');
        const selectFamilyContainer = document.getElementById('selectFamilyContainer');
        const selectGenContainer = document.getElementById('selectGenContainer');
        const selectFamilySelect = document.getElementById('selectFamilySelect');
        const selectGenerationSelect = document.getElementById('selectGenerationSelect');
        const compareSearchInput = document.getElementById('compareSearchInput');
        const compareSelectList = document.getElementById('compareSelectList');
        const confirmCompareBtn = document.getElementById('confirmCompareBtn');
        const clearSelectedBtn = document.getElementById('clearSelectedBtn');

        // 收藏相关
        const favoritesFloatBtn = document.getElementById('favoritesFloatBtn');
        const favoritesModal = document.getElementById('favoritesModal');
        const favoritesModalList = document.getElementById('favoritesModalList');

        // 主题切换
        const themeToggle = document.getElementById('themeToggleFloat');

        // 侧边栏控制（仅保留右下角展开按钮）
        const expandBtn = document.getElementById('expandSidebarBtn');
        const overlay = document.getElementById('sidebar-overlay');
        const body = document.body;

        // ---------- 侧边栏功能 ----------
        function closeSidebar() {
            body.classList.add('sidebar-hidden');
        }
        function toggleSidebar() {
            body.classList.toggle('sidebar-hidden');
        }
        if (expandBtn) {
            expandBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleSidebar();
            });
        }
        if (overlay) {
            overlay.addEventListener('click', closeSidebar);
        }
        function handleResponsiveSidebar() {
            if (window.innerWidth <= 900) {
                body.classList.add('sidebar-hidden');
            } else {
                body.classList.remove('sidebar-hidden');
            }
        }
        window.addEventListener('resize', () => {
            clearTimeout(window.resizeTimer);
            window.resizeTimer = setTimeout(handleResponsiveSidebar, 150);
        });
        handleResponsiveSidebar();

        // ---------- 菜单悬停控制 ----------
        window.menuTimers = {};
        window.menuEnter = function(menuId) {
            if (window.menuTimers[menuId]) {
                clearTimeout(window.menuTimers[menuId]);
                delete window.menuTimers[menuId];
            }
            const menu = document.getElementById(menuId);
            if (menu) menu.classList.remove('hidden');
        };
        window.menuLeave = function(menuId) {
            window.menuTimers[menuId] = setTimeout(() => {
                const menu = document.getElementById(menuId);
                if (menu) menu.classList.add('hidden');
                delete window.menuTimers[menuId];
            }, 100);
        };

        // ---------- 折叠/展开卡片 ----------
        window.toggleCard = function(header) {
            const card = header.closest('.part-card');
            if (!card) return;
            const body = card.querySelector('.part-card-body');
            const icon = header.querySelector('.fold-icon');
            card.classList.toggle('folded');
            if (card.classList.contains('folded')) {
                icon.textContent = '▶';
            } else {
                icon.textContent = '▼';
            }
        };

        // ---------- FRU 模态框 ----------
        window.closeFruModal = function() {
            document.getElementById('fruModal').classList.remove('show');
        };
        function showFruModal(partData) {
            const modal = document.getElementById('fruModal');
            const body = document.getElementById('fruModalBody');
            body.innerHTML = formatFruContent(partData);
            modal.classList.add('show');
        }
        window.showFruModalByPartId = function(menuItem, partId, menuId) {
            if (event) event.stopPropagation();
            if (!currentDeviceParts) return;
            const [type, index] = partId.split('_');
            const part = currentDeviceParts[type]?.[parseInt(index)];
            if (part) showFruModal(part.data);
            const menu = document.getElementById(menuId);
            if (menu) menu.classList.add('hidden');
            if (window.menuTimers[menuId]) clearTimeout(window.menuTimers[menuId]);
        };

        // ---------- 对比结果模态框 ----------
        window.closeCompareModal = function() {
            document.getElementById('compareModal').classList.remove('show');
        };

        async function showCompareModal() {
            if (selectedModels.length === 0) return;
            const modal = document.getElementById('compareModal');
            const body = document.getElementById('compareModalBody');
            
            body.innerHTML = '<div class="loading">加载对比数据中...</div>';
            modal.classList.add('show');

            try {
                const devicesWithParts = await Promise.all(selectedModels.map(async (model) => {
                    const parts = await loadDeviceParts(model);
                    return { model, parts };
                }));

                // 辅助格式化函数（保持原样）
                function formatMemory(model) {
                    if (!model.memory) return 'N/A';
                    let html = '<div class="part-info">';
                    if (model.memory.max_capacity) html += `<div><span class="field-name">容量:</span> <span class="field-value">${model.memory.max_capacity}</span></div>`;
                    if (model.memory.type) html += `<div><span class="field-name">类型:</span> <span class="field-value">${model.memory.type}</span></div>`;
                    if (model.memory.slots) html += `<div><span class="field-name">插槽:</span> <span class="field-value">${model.memory.slots}</span></div>`;
                    if (model.memory.features) html += `<div><span class="field-name">特性:</span> <span class="field-value">${model.memory.features}</span></div>`;
                    html += '</div>';
                    return html;
                }

                function formatStorage(model) {
                    if (!model.storage) return 'N/A';
                    const fieldLabels = {
                        ssd_sata: 'SATA SSD',
                        ssd_pcie: 'PCIe SSD',
                        hdd: '2.5" HDD',
                        sshd: 'SSHD',
                        optical: '光驱'
                    };
                    let items = [];
                    for (const [key, value] of Object.entries(model.storage)) {
                        if (value && typeof value === 'string' && value.trim() !== '') {
                            const title = fieldLabels[key] || key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                            const content = value.replace(/"/g, '&quot;');
                            items.push(`
                                <div class="part-item" style="margin-bottom: 4px; padding: 8px;">
                                    <div class="part-info">
                                        <div class="part-title" style="font-size:1rem;">${title}</div>
                                        <div>${content}</div>
                                    </div>
                                </div>
                            `);
                        }
                    }
                    if (items.length === 0) return 'N/A';
                    return items.join('');
                }

                function formatBattery(model) {
                    const batteries = model.Battary || model.battery;
                    if (!batteries || batteries.length === 0) return 'N/A';
                    let html = '';
                    batteries.forEach(b => {
                        const type = b.type || '电池';
                        const capacity = b.capacity || b.cap || '';
                        const tech = b.tech || b.technology || '';
                        const form = b.form || '';
                        let info = `${type}: ${capacity}`;
                        if (tech) info += ` (${tech})`;
                        if (form) info += ` - ${form}`;
                        html += `<div class="compare-part-item">${info}</div>`;
                    });
                    return html;
                }

                function formatDisplayOutput(model) {
                    if (!model.Display) return 'N/A';
                    let html = '<div class="part-info">';
                    if (model.Display.max_resolution && typeof model.Display.max_resolution === 'object') {
                        for (const [port, res] of Object.entries(model.Display.max_resolution)) {
                            if (res && typeof res === 'string') {
                                const portName = port.replace(/_/g, ' ');
                                html += `<div><span class="field-name">${portName}:</span> <span class="field-value">${res}</span></div>`;
                            }
                        }
                    } else if (model.Display.max_resolution) {
                        html += `<div><span class="field-name">最大分辨率:</span> <span class="field-value">${model.Display.max_resolution}</span></div>`;
                    }
                    if (model.Display.multi_display) {
                        html += `<div><span class="field-name">多屏支持:</span> <span class="field-value">${model.Display.multi_display}</span></div>`;
                    }
                    html += '</div>';
                    return html;
                }

                function formatPhysicalPorts(model) {
                    if (!model.ports) return 'N/A';
                    if (Array.isArray(model.ports)) {
                        return `<div class="part-info">${model.ports.map(p => `<div>${p}</div>`).join('')}</div>`;
                    } else {
                        return `<div class="part-info"><div>${model.ports}</div></div>`;
                    }
                }

                function formatOther(model) {
                    const items = [];
                    if (model.physical?.dimensions) items.push(`<div><span class="field-name">尺寸:</span> <span class="field-value">${model.physical.dimensions}</span></div>`);
                    if (model.physical?.weight) items.push(`<div><span class="field-name">重量:</span> <span class="field-value">${model.physical.weight}</span></div>`);
                    const material = model.physical?.case_material || model.case_material;
                    if (material) items.push(`<div><span class="field-name">材质:</span> <span class="field-value">${material}</span></div>`);
                    if (model.security) {
                        const sec = Array.isArray(model.security) ? model.security.join('、') : model.security;
                        items.push(`<div><span class="field-name">安全特性:</span> <span class="field-value">${sec}</span></div>`);
                    }
                    if (model.system) {
                        const sys = Array.isArray(model.system) ? model.system.join('<br>') : model.system;
                        items.push(`<div><span class="field-name">预装系统:</span> <span class="field-value">${sys}</span></div>`);
                    }
                    if (model.ACadapter) {
                        const ac = Array.isArray(model.ACadapter) ? model.ACadapter.join('、') : model.ACadapter;
                        items.push(`<div><span class="field-name">电源适配器:</span> <span class="field-value">${ac}</span></div>`);
                    }
                    if (model['color calibration']) {
                        const cc = Array.isArray(model['color calibration']) ? model['color calibration'].join('、') : model['color calibration'];
                        items.push(`<div><span class="field-name">校色仪:</span> <span class="field-value">${cc}</span></div>`);
                    }
                    if (items.length === 0) return 'N/A';
                    return `<div class="part-info">${items.join('')}</div>`;
                }

                const compareRows = [
                    { label: '处理器 (CPU)', getValue: (model, parts) => {
                        if (!parts.cpu || parts.cpu.length === 0) return '无';
                        return parts.cpu.map(part => `<div class="compare-part-item">${formatPartFullInfo(part.data, 'cpu')}</div>`).join('<hr class="compare-part-sep">');
                    }},
                    { label: '显卡', getValue: (model, parts) => {
                        if (!parts.graphics || parts.graphics.length === 0) return '无';
                        return parts.graphics.map(part => `<div class="compare-part-item">${formatPartFullInfo(part.data, 'graphics')}</div>`).join('<hr class="compare-part-sep">');
                    }},
                    { label: '显示输出', getValue: (model, parts) => formatDisplayOutput(model) },
                    { label: '内存', getValue: (model, parts) => formatMemory(model) },
                    { label: '显示屏', getValue: (model, parts) => {
                        if (!parts.display || parts.display.length === 0) return '无';
                        return parts.display.map(part => `<div class="compare-part-item">${formatPartFullInfo(part.data, 'display')}</div>`).join('<hr class="compare-part-sep">');
                    }},
                    { label: '储存', getValue: (model, parts) => formatStorage(model) },
                    { label: '电池', getValue: (model, parts) => formatBattery(model) },
                    { label: '有线网卡', getValue: (model, parts) => {
                        if (!parts.ethernet || parts.ethernet.length === 0) return '无';
                        return parts.ethernet.map(part => `<div class="compare-part-item">${formatPartFullInfo(part.data, 'ethernet')}</div>`).join('<hr class="compare-part-sep">');
                    }},
                    { label: '无线网卡', getValue: (model, parts) => {
                        if (!parts.wlan || parts.wlan.length === 0) return '无';
                        return parts.wlan.map(part => `<div class="compare-part-item">${formatPartFullInfo(part.data, 'wlan')}</div>`).join('<hr class="compare-part-sep">');
                    }},
                    { label: 'WWAN', getValue: (model, parts) => {
                        if (!parts.wwan || parts.wwan.length === 0) return '无';
                        return parts.wwan.map(part => `<div class="compare-part-item">${formatPartFullInfo(part.data, 'wwan')}</div>`).join('<hr class="compare-part-sep">');
                    }},
                    { label: '物理接口', getValue: (model, parts) => formatPhysicalPorts(model) },
                    { label: '其他', getValue: (model, parts) => formatOther(model) }
                ];

                let html = '<table class="compare-table"><thead><tr><th>规格</th>';
                devicesWithParts.forEach(item => {
                    html += `<th>${item.model.model_name}</th>`;
                });
                html += '</tr></thead><tbody>';

                for (const row of compareRows) {
                    html += '<tr>';
                    html += `<td>${row.label}</td>`;
                    devicesWithParts.forEach(item => {
                        const value = row.getValue(item.model, item.parts);
                        html += `<td>${value}</td>`;
                    });
                    html += '</tr>';
                }

                html += '</tbody></table>';
                body.innerHTML = html;
            } catch (error) {
                console.error('加载对比数据失败:', error);
                body.innerHTML = '<div class="empty-message">加载对比数据失败</div>';
            }
        }

        function clearCompare() {
            selectedModels = [];
            if (compareSelectModal.classList.contains('show')) {
                renderCompareSelectList();
            }
            applyFilterAndRender();
        }

        // ---------- 搜索模态框函数 ----------
        window.closeSearchModal = function() {
            searchModal.classList.remove('show');
        };

        function openSearchModal() {
            searchModal.classList.add('show');
            searchModalInput.focus();
            renderSearchResults('');
        }

        function renderSearchResults(query) {
            const filtered = masterModelList.filter(model => 
                model.model_name.toLowerCase().includes(query.toLowerCase())
            );
            let html = '';
            filtered.forEach(model => {
                html += `
                    <div class="search-result-card" onclick="selectModelFromSearch('${model.model_name}')">
                        <div class="search-result-title">${model.model_name}</div>
                        <div class="search-result-meta">
                            <span>${model.model_family || '系列未知'}</span> · <span>${model.model_generation || '代数未知'}</span>
                        </div>
                    </div>
                `;
            });
            if (filtered.length === 0) {
                html = '<div class="search-no-results">未找到匹配的型号</div>';
            }
            searchModalResults.innerHTML = html;
        }

        window.selectModelFromSearch = function(modelName) {
            const model = masterModelList.find(m => m.model_name === modelName);
            if (model) {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                const targetItem = Array.from(document.querySelectorAll('.nav-item')).find(item => item.dataset.modelId === modelName);
                if (targetItem) targetItem.classList.add('active');
                renderSpecs(model);
                closeSearchModal();
            }
        };

        // ---------- 对比选择模态框函数 ----------
        window.closeCompareSelectModal = function() {
            compareSelectModal.classList.remove('show');
        };

        function openCompareSelectModal() {
            populateSelectFilterOptions();
            selectFamilySelect.value = selectFamilyValue;
            selectGenerationSelect.value = selectGenValue;
            compareSearchInput.value = selectSearchTerm;
            renderCompareSelectList();
            compareSelectModal.classList.add('show');
        }

        function populateSelectFilterOptions() {
            const families = [...new Set(masterModelList.map(m => m.model_family).filter(Boolean))].sort();
            selectFamilySelect.innerHTML = '<option value="">全部系列</option>';
            families.forEach(f => {
                let opt = document.createElement('option');
                opt.value = f;
                opt.textContent = f;
                selectFamilySelect.appendChild(opt);
            });

            const gens = [...new Set(masterModelList.map(m => m.model_generation).filter(Boolean))].sort((a, b) => {
                const getPriority = (s) => {
                    if (s.length === 3) return 1;
                    if (s.length === 4) return 2;
                    if (s.toLowerCase().startsWith('gen')) return 3;
                    return 4;
                };
                const pa = getPriority(a);
                const pb = getPriority(b);
                if (pa !== pb) return pa - pb;
                return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
            });

            selectGenerationSelect.innerHTML = '<option value="">全部代数</option>';
            gens.forEach(g => {
                let opt = document.createElement('option');
                opt.value = g;
                opt.textContent = g;
                selectGenerationSelect.appendChild(opt);
            });
        }

        function getFilteredModelsForSelect() {
            let filtered = masterModelList;
            if (selectFilterType === 'family' && selectFamilyValue) {
                filtered = filtered.filter(m => m.model_family === selectFamilyValue);
            } else if (selectFilterType === 'generation' && selectGenValue) {
                filtered = filtered.filter(m => m.model_generation === selectGenValue);
            }
            if (selectSearchTerm) {
                filtered = filtered.filter(m => m.model_name.toLowerCase().includes(selectSearchTerm.toLowerCase()));
            }
            return filtered;
        }

        function renderCompareSelectList() {
            const models = getFilteredModelsForSelect();
            let html = '';
            models.forEach(model => {
                const checked = selectedModels.some(m => m.model_name === model.model_name) ? 'checked' : '';
                html += `
                    <div class="compare-select-card">
                        <input type="checkbox" class="compare-select-checkbox" value="${model.model_name}" ${checked} onchange="toggleSelectModel('${model.model_name}', this.checked)">
                        <div class="compare-select-info">
                            <div class="compare-select-title">${model.model_name}</div>
                            <div class="compare-select-meta">
